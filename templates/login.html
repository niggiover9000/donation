{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card premium-card border-0 shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock-fill fs-3 text-secondary"></i>
                    </div>
                    <h3 class="fw-bold">Admin Login</h3>
                    <p class="text-muted small">Bitte authentifizieren, um fortzufahren.</p>
                </div>

                {% if request.query_params.get('error') %}
                <div class="alert alert-danger py-2 small mb-4">
                    Ungültiges Passwort.
                </div>
                {% endif %}

                <form action="/login" method="post">
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Passwort</label>
                        <input type="password" class="form-control form-control-lg premium-input" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark btn-lg premium-btn">Einloggen</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
